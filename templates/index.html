<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ArxivToDBLP</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    .CodeMirror { height: 500px; font-size: 14px; border: 1px solid #ddd; }
    .actions { margin-top: 1rem; }
    .flash { padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; }
    .flash.error { background: #ffe8e8; color: #8a1f1f; border: 1px solid #f0b6b6; }
  </style>
</head>
<body>
  <h2>Upload a .bib file</h2>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form id="upload-form" method="post" action="{{ url_for('review') }}" enctype="multipart/form-data">
    <input type="file" id="bibfile" name="bibfile" accept=".bib" required>
    <textarea id="editor" aria-label="BibTeX preview"></textarea>
    <div class="actions">
      <button type="submit">Review DBLP replacements</button>
    </div>
  </form>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/stex/stex.min.js"></script>
  <script>
    const editor = CodeMirror.fromTextArea(document.getElementById("editor"), {
      lineNumbers: true,
      mode: "stex",
      lineWrapping: true,
      viewportMargin: Infinity,
      readOnly: true,
    });

    document.getElementById("bibfile").addEventListener("change", function () {
      const file = this.files[0];
      if (file && file.name.endsWith('.bib')) {
        const reader = new FileReader();
        reader.onload = function (e) {
          editor.setValue(e.target.result);
        };
        reader.readAsText(file);
      }
    });
  </script>
</body>
</html>
